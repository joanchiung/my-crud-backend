openapi: 3.0.3
info:
  title: Todo List API
  description: A simple Todo List REST API with categories support, built with Express.js and Drizzle ORM.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Backend (direct)
  - url: http://localhost:8090
    description: Via Nginx reverse proxy

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [Health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/todos:
    get:
      summary: List all todos
      operationId: listTodos
      tags: [Todos]
      responses:
        "200":
          description: List of todos with their categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TodoWithCategories"
        "500":
          $ref: "#/components/responses/ServerError"

    post:
      summary: Create a new todo
      operationId: createTodo
      tags: [Todos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTodoRequest"
      responses:
        "201":
          description: Todo created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoWithCategories"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/todos/{id}:
    parameters:
      - $ref: "#/components/parameters/TodoId"

    get:
      summary: Get a single todo
      operationId: getTodo
      tags: [Todos]
      responses:
        "200":
          description: Todo with categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoWithCategories"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

    patch:
      summary: Update a todo
      operationId: updateTodo
      tags: [Todos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTodoRequest"
      responses:
        "200":
          description: Todo updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoWithCategories"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

    delete:
      summary: Delete a todo
      operationId: deleteTodo
      tags: [Todos]
      responses:
        "200":
          description: Todo deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Todo deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/todos/{id}/categories:
    parameters:
      - $ref: "#/components/parameters/TodoId"

    post:
      summary: Attach categories to a todo
      operationId: attachCategories
      tags: [Todos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoryIds]
              properties:
                categoryIds:
                  type: array
                  items:
                    type: integer
                  example: [1, 2]
      responses:
        "200":
          description: Categories attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoWithCategories"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/todos/{id}/categories/{categoryId}:
    parameters:
      - $ref: "#/components/parameters/TodoId"
      - name: categoryId
        in: path
        required: true
        schema:
          type: integer

    delete:
      summary: Detach a category from a todo
      operationId: detachCategory
      tags: [Todos]
      responses:
        "200":
          description: Category detached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoWithCategories"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/categories:
    get:
      summary: List all categories
      operationId: listCategories
      tags: [Categories]
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        "500":
          $ref: "#/components/responses/ServerError"

    post:
      summary: Create a new category
      operationId: createCategory
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Category name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      summary: Get a single category with its todos
      operationId: getCategory
      tags: [Categories]
      responses:
        "200":
          description: Category with todos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryWithTodos"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

    patch:
      summary: Update a category
      operationId: updateCategory
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Category name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

    delete:
      summary: Delete a category
      operationId: deleteCategory
      tags: [Categories]
      responses:
        "200":
          description: Category deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Category deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

components:
  parameters:
    TodoId:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    Todo:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        completed:
          type: boolean
        priority:
          type: integer
          description: "0 = low, 1 = medium, 2 = high"
          enum: [0, 1, 2]
        dueDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
          description: Hex color code
          example: "#3b82f6"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TodoWithCategories:
      allOf:
        - $ref: "#/components/schemas/Todo"
        - type: object
          properties:
            categories:
              type: array
              items:
                $ref: "#/components/schemas/Category"

    CategoryWithTodos:
      allOf:
        - $ref: "#/components/schemas/Category"
        - type: object
          properties:
            todos:
              type: array
              items:
                $ref: "#/components/schemas/Todo"

    CreateTodoRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        priority:
          type: integer
          enum: [0, 1, 2]
        dueDate:
          type: string
          format: date-time
        categoryIds:
          type: array
          items:
            type: integer

    UpdateTodoRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        completed:
          type: boolean
        priority:
          type: integer
          enum: [0, 1, 2]
        dueDate:
          type: string
          format: date-time
        categoryIds:
          type: array
          items:
            type: integer

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
        color:
          type: string
          description: Hex color code (e.g. "#ff0000")
          maxLength: 7

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        color:
          type: string
          maxLength: 7

    Error:
      type: object
      properties:
        error:
          type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

tags:
  - name: Health
    description: Health check endpoint
  - name: Todos
    description: Todo CRUD and category association
  - name: Categories
    description: Category CRUD
